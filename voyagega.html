<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carnet de Route : Fexhe ➔ Gran Alacant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>


    <style>
        body { -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        .glass-panel { background: white; shadow: 0 4px 6px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; }
        .pdf-mode { padding: 20px; background: white; }
        .pdf-mode .pdf-hide { display: none !important; }
    </style>
</head>
<body class="text-slate-800 font-sans min-h-screen pb-10 flex flex-col items-center">


    <header class="w-full bg-blue-600 text-white p-6 shadow-md rounded-b-3xl max-w-2xl text-center pdf-hide">
        <h1 class="text-2xl font-bold mb-1">Mon Roadtrip 🚗</h1>
        <p class="text-blue-100 text-sm">Fexhe-le-Haut-Clocher ➔ Gran Alacant</p>
    </header>


    <main id="export-area" class="w-full max-w-2xl px-4 mt-6">
        
        <div id="pdf-header" class="hidden text-center mb-8 pb-4 border-b-2">
            <h1 class="text-3xl font-bold">Journal de Route</h1>
            <p>De Fexhe-le-Haut-Clocher à Gran Alacant</p>
        </div>


        <div class="glass-panel rounded-2xl p-5 mb-8 shadow-sm pdf-hide">
            <div class="space-y-4 mb-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">Note / Anecdote :</label>
                    <textarea id="note-input" rows="2" class="w-full border border-slate-300 rounded-xl p-3 outline-none focus:border-blue-500" placeholder="Ex: Pause café, bouchons..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">ETA (Heure d'arrivée prévue) :</label>
                    <input type="time" id="eta-input" class="w-full border border-slate-300 rounded-xl p-3 outline-none bg-white">
                </div>
            </div>
            
            <button id="btn-record" onclick="recordWaypoint()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-3 active:scale-95 transition-transform">
                <i class="ph-bold ph-map-pin-line text-2xl"></i>
                <span>Enregistrer l'étape</span>
            </button>
            <div id="status-message" class="hidden mt-4 text-sm text-center p-2 rounded-lg"></div>
        </div>


        <div>
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-slate-700">Mes Étapes (<span id="waypoint-count">0</span>)</h2>
            </div>
            <div id="waypoints-container" class="space-y-4">
                </div>
        </div>
    </main>


    <div class="fixed bottom-6 right-6 pdf-hide">
        <button onclick="exportToPDF()" id="btn-pdf" class="bg-slate-800 text-white p-4 rounded-full shadow-2xl disabled:opacity-50 transition-transform active:scale-90">
            <i class="ph-bold ph-download-simple text-2xl"></i>
        </button>
    </div>


    <script>
        let waypoints = JSON.parse(localStorage.getItem('myRoadtripData')) || [];


        window.onload = () => { renderWaypoints(); };


        function showStatus(msg, isError = false) {
            const el = document.getElementById('status-message');
            el.textContent = msg;
            el.className = `mt-4 text-sm font-medium text-center p-2 rounded-lg block ${isError ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'}`;
            if (!isError) setTimeout(() => el.classList.add('hidden'), 4000);
        }


        // Calcul du temps restant
        function calculateRemainingTime(etaStr, currentNow) {
            if (!etaStr) return null;
            
            const [etaHours, etaMins] = etaStr.split(':').map(Number);
            const currHours = currentNow.getHours();
            const currMins = currentNow.getMinutes();
            
            let diffMins = (etaHours * 60 + etaMins) - (currHours * 60 + currMins);
            
            // Gestion du passage à minuit (ex: il est 23h, ETA à 02h)
            if (diffMins < 0) {
                diffMins += 24 * 60;
            }
            
            const hours = Math.floor(diffMins / 60);
            const mins = diffMins % 60;
            
            if (hours > 0) {
                return `${hours}h${mins.toString().padStart(2, '0')}`;
            } else {
                return `${mins} min`;
            }
        }


        async function recordWaypoint() {
            const btn = document.getElementById('btn-record');
            
            if (!navigator.geolocation) {
                alert("Le GPS n'est pas disponible sur ce navigateur.");
                return;
            }


            btn.disabled = true;
            btn.innerHTML = "Localisation en cours...";
            showStatus("Recherche GPS...");


            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const now = new Date();
                
                let locationName = "Position GPS enregistrée";
                
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10`);
                    if(res.ok) {
                        const data = await res.json();
                        locationName = data.address.city || data.address.town || data.address.village || data.address.county || "Sur la route";
                    }
                } catch (e) { console.log("Erreur nom lieu"); }


                const etaValue = document.getElementById('eta-input').value;
                const timeRemaining = calculateRemainingTime(etaValue, now);


                const newPoint = {
                    id: Date.now(),
                    location: locationName,
                    time: now.toLocaleTimeString('fr-BE', {hour: '2-digit', minute:'2-digit'}),
                    date: now.toLocaleDateString('fr-BE'),
                    lat: lat.toFixed(4),
                    lon: lon.toFixed(4),
                    note: document.getElementById('note-input').value,
                    eta: etaValue,
                    remaining: timeRemaining
                };


                waypoints.push(newPoint);
                localStorage.setItem('myRoadtripData', JSON.stringify(waypoints));
                
                document.getElementById('note-input').value = "";
                document.getElementById('eta-input').value = "";
                
                renderWaypoints();
                btn.disabled = false;
                btn.innerHTML = '<i class="ph-bold ph-map-pin-line text-2xl"></i><span>Enregistrer l\'étape</span>';
                showStatus("Étape enregistrée !");


            }, (err) => {
                btn.disabled = false;
                btn.innerHTML = '<i class="ph-bold ph-map-pin-line text-2xl"></i><span>Enregistrer l\'étape</span>';
                alert("Erreur GPS : Assurez-vous d'avoir activé la localisation et autorisé cette page.");
                showStatus("Erreur GPS", true);
            }, { enableHighAccuracy: true, timeout: 10000 });
        }


        function renderWaypoints() {
            const container = document.getElementById('waypoints-container');
            const count = document.getElementById('waypoint-count');
            container.innerHTML = "";
            count.textContent = waypoints.length;


            [...waypoints].reverse().forEach(wp => {
                const div = document.createElement('div');
                div.className = "glass-panel p-4 rounded-xl relative shadow-sm mb-4 border border-slate-200 bg-white";
                
                let etaHtml = '';
                if (wp.eta) {
                    etaHtml = `
                        <div class="mt-2 inline-flex items-center bg-orange-50 text-orange-700 text-sm font-medium px-3 py-1.5 rounded-lg border border-orange-100">
                            <i class="ph-bold ph-clock mr-2"></i> 
                            ETA : ${wp.eta} 
                            ${wp.remaining ? `<span class="ml-2 pl-2 border-l border-orange-200 text-orange-600">Reste : ${wp.remaining}</span>` : ''}
                        </div>
                    `;
                }


                div.innerHTML = `
                    <button onclick="deletePoint(${wp.id})" class="pdf-hide absolute top-2 right-2 text-red-400 hover:bg-red-50 p-2 rounded-full transition-colors" title="Supprimer"><i class="ph-bold ph-trash"></i></button>
                    <div class="flex justify-between font-bold text-blue-600 text-lg pr-8">
                        <span>${wp.location}</span>
                        <span>${wp.time}</span>
                    </div>
                    <div class="text-xs text-slate-400 mb-2 font-mono">${wp.date} • GPS: ${wp.lat}, ${wp.lon}</div>
                    ${wp.note ? `<div class="bg-slate-50 border border-slate-100 p-3 rounded-lg text-sm text-slate-600 italic mb-2">« ${wp.note} »</div>` : ''}
                    ${etaHtml}
                `;
                container.appendChild(div);
            });
            document.getElementById('btn-pdf').disabled = waypoints.length === 0;
        }


        function deletePoint(id) {
            if(confirm("Supprimer cette étape ?")) {
                waypoints = waypoints.filter(p => p.id !== id);
                localStorage.setItem('myRoadtripData', JSON.stringify(waypoints));
                renderWaypoints();
            }
        }


        function exportToPDF() {
            const element = document.getElementById('export-area');
            document.getElementById('pdf-header').classList.remove('hidden');
            element.classList.add('pdf-mode');
            
            const opt = {
                margin: 10,
                filename: `Roadtrip_Fexhe_Alicante_${new Date().toLocaleDateString('fr-BE').replace(/\//g, '-')}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };


            html2pdf().set(opt).from(element).save().then(() => {
                element.classList.remove('pdf-mode');
                document.getElementById('pdf-header').classList.add('hidden');
            });
        }
    </script>
</body>
</html>
