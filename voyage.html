<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carnet de Route : Fexhe ➔ Gran Alacant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>


    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .pdf-mode {
            padding: 20px !important;
            background: white !important;
        }
        .pdf-mode .pdf-hide {
            display: none !important;
        }
    </style>
</head>
<body class="text-slate-800 font-sans min-h-screen antialiased flex flex-col items-center pb-10">


    <header class="w-full bg-blue-600 text-white p-6 shadow-md rounded-b-3xl max-w-2xl text-center pdf-hide relative">
        <div class="absolute top-4 right-4 flex items-center gap-1 text-xs font-medium" id="cloud-status" title="Vérification...">
            <i class="ph-fill ph-cloud-warning text-xl text-yellow-300"></i>
        </div>
        
        <h1 class="text-2xl font-bold mb-1 mt-2">Mon Roadtrip</h1>
        <p class="text-blue-100 text-sm flex items-center justify-center gap-2">
            <i class="ph-fill ph-car-profile text-lg"></i>
            Fexhe-le-Haut-Clocher <i class="ph-bold ph-arrow-right"></i> Gran Alacant
        </p>
    </header>


    <main id="export-area" class="w-full max-w-2xl px-4 mt-6">
        <div id="pdf-header" class="hidden text-center mb-8 pb-4 border-b-2 border-slate-200">
            <h1 class="text-3xl font-bold text-slate-800">Journal de Route</h1>
            <p class="text-slate-500 mt-2">De Fexhe-le-Haut-Clocher à Gran Alacant</p>
            <p class="text-slate-400 text-sm mt-1" id="pdf-date"></p>
        </div>


        <div class="glass-panel rounded-2xl p-5 mb-8 pdf-hide">
            <div class="space-y-4 mb-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">Note de voyage :</label>
                    <textarea id="note-input" rows="2" class="w-full border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all resize-none" placeholder="Une anecdote ?"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">
                        <i class="ph-bold ph-clock-countdown text-blue-500 mr-1"></i> ETA (Arrivée prévue) :
                    </label>
                    <input type="time" id="eta-input" class="w-full border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                </div>
            </div>
            
            <button id="btn-record" class="w-full bg-blue-600 active:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl shadow-lg flex items-center justify-center gap-3 transition-transform active:scale-95 disabled:opacity-50">
                <i class="ph-bold ph-map-pin-line text-2xl"></i>
                <span>Enregistrer l'étape</span>
            </button>
            <div id="status-message" class="hidden mt-4 text-sm text-center px-3 py-2 rounded-lg font-medium"></div>
        </div>


        <div>
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold text-slate-700">Mes Étapes</h2>
                <span id="waypoint-count" class="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-1 rounded-full">0</span>
            </div>
            
            <div id="waypoints-container" class="space-y-6">
                <div id="empty-state" class="text-center py-10 text-slate-400">
                    <i class="ph-duotone ph-map-trifold text-5xl mb-3 opacity-50"></i>
                    <p>Aucune étape enregistrée.</p>
                </div>
            </div>
        </div>
    </main>


    <div class="fixed bottom-6 right-6 pdf-hide">
        <button id="btn-pdf" class="bg-slate-800 text-white p-4 rounded-full shadow-2xl transition-all active:scale-90 opacity-50 cursor-not-allowed" disabled>
            <i class="ph-bold ph-download-simple text-2xl"></i>
        </button>
    </div>


    <script type="module">
        // Ton script reste identique, il est très bien conçu. 
        // Assure-toi juste que les variables __firebase_config sont bien définies globalement.
    </script>
</body>
</html>
